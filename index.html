<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0B0B0F" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <link
      rel="apple-touch-icon"
      href="/iron-pulse-v2/assets/icons/icon-192.png"
    />
    <link rel="manifest" href="./manifest.webmanifest" />
    <title>Iron Pulse V2</title>

    <link rel="stylesheet" href="./src/styles.css" />
  </head>

  <body>
    <div id="app">
      <!-- Sticky Header -->
      <header class="header">
        <div class="brand">
          <div class="logo">
            <img
              src="./assets/icons/icon-192.png"
              alt="Iron Pulse logo"
              class="logoImg"
            />
          </div>
          <div class="brandText">
            <div class="brandTitle">Iron Pulse</div>
          </div>
        </div>

        <button id="btnInstall" class="iconBtn" style="display: none">
          Install
        </button>
      </header>

      <!-- Main -->
      <main class="main">
        <section id="streakBanner" class="card"></section>

        <section id="goalCard" class="card"></section>

        <section class="grid">
          <div id="weeklyVolume" class="card"></div>
          <div id="heatmap"></div>
          <div id="todaysSplit" class="card"></div>
        </section>

        <section id="todaySummary" class="card"></section>

        <section id="afterburn" class="card"></section>
      </main>

      <!-- Sticky CTA -->
      <footer class="footer">
        <button class="cta" id="btnCTA">Start Today</button>
      </footer>
    </div>

    <!-- Modal Root -->
    <div id="modalRoot"></div>
    <div id="toastRoot"></div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
